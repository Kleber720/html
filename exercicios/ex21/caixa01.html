<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{/*box-level*/
            display: inline;
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkgoldenrod;

            border: 10px solid darkblue;/*shothand*/

            padding-top: 21px;
            padding-left: 50px;
            padding-bottom: 10px;
            padding-right: 10px;
            

            padding: 10px 50px 10px 10px ;/*shothand*/

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10;
            margin-left: 20px;

            margin: 10px 10px 10px 20px; /*shothand*/
            margin: 10px 20px;/*shothand*/

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
            outline: 5px dashed salmon;/*shothand*/
        }
    </style>
</head>
<body>
   <h1>Exemplo de caixa box-level</h1>
   <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>vamos ver como funciona</p>

    
</body>
</html>
