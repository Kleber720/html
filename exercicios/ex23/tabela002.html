<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>

        caption{
            font-size: 1.5em;
            font-weight: bolder;

        }
        table{
            width: 500px;
            border-collapse: collapse;
            
        }

        td,th{
            border: 1px solid black;
            padding: 10px;
        }

        thead{
            background-color: rgb(27, 26, 26);
            color: white;
        }

        tr .num{
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>

    <!--ANATOMIA PARA TAEBLAS GRANDES 
    TABLE
        THEAD
            TR,TD,TH
        TBODY
            TR,TD,TH
        TFOOT
            TR,TD,T
            -->
            <table>
                <caption>População dos estados do brasil</caption>
                <thead>
                    <tr>
                        <th>Estado</th>
                        <th class="col" style="width: 50px;">População</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>São Paulo</td>
                        <td class="num">45 919 049</td>
                    </tr>
                    <tr>
                        <td>Minas Gerais</td>
                        <td class="num"> 21 168 791</td>
                    </tr>
                    <tr>
                        <td>Rio de Janeiro</td>
                        <td class="num">17 264 943</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th>Total de habitantes</th>
                        <td class="num"><strong>84.352.783</strong></td>
                    </tr>
                </tfoot>
            </table>
    
</body>
</html>
