<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tag</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>em HTLM5,podemos inserir os elementos da lista a seguir,Passe o mouse sobre os termos para descobrir qual tag deverá <br>
    utilizar em cada caso.</p>
    <ul>
        <li><abbr title="utilizamos a tag &lt;p&gt;">paragrafos</abbr> </li>
        <li><abbr title="utilizamos a tag &lt;title&gt;">titulo</abbr></li>
        <li><abbr title="utilizamos a tag &lt;img&gt;">imagem</abbr></li>
        <li><abbr title="utilizamos a tag &lt;abbr&gt;">abreviação</abbr></li>
        <li><abbr title="utilizamos a tag &lt;code&gt;">Códigos</abbr></li>
        <li><abbr title="utilizamos a tag &lt;OL&gt;">listas-numeradas</abbr></li>
        <li><abbr title="utilizamos a tag &lt;UL&GT;">listas com demarcadores</abbr></li>
    </ul>
    
</body>
</html>
