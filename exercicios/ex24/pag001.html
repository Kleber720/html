<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>

   <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightgray;
        }

        table{
            border-collapse: collapse;
        }

        caption{
            font-size: 1.2em;
            font-weight: bolder;
            padding: 20px;

        }

        th,td{
            border: 1px solid black;
            padding: 10px;
        }
        tr:nth-child(even){
            background-color: rgb(236, 233, 233);
        }
        
        tr:nth-child(odd){
            background-color: white;
        }

        #container{
            overflow-x: auto;
        }

    </style>
</head>
<body>
        <h1>isso é um teste</h1>
            <div id="container">
        <table>

    </div>
    
</body>
</html>
